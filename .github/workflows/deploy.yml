name: Deploy BIGS

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build_backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./env/backend/Dockerfile
          push: true
          tags: ximikat01/bigs_backend:latest

      - name: Итог (backend)
        run: |
          echo "Backend собран и запушен: ximikat01/bigs_backend:latest" >> $GITHUB_STEP_SUMMARY

  build_frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./env/frontend/Dockerfile
          push: true
          tags: ximikat01/bigs_frontend:latest

      - name: Итог (frontend)
        run: |
          echo "Frontend собран и запушен: ximikat01/bigs_frontend:latest" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Deploy on server
    runs-on: ubuntu-latest
    needs: [ build_backend, build_frontend ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -t rsa ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
          echo "SSH подготовлен"

      - name: Ensure remote dirs exist
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "mkdir -p '${{ secrets.PROJECT_DIR }}/env/frontend' && mkdir -p /opt/backups && chmod 777 /opt/backups && mkdir -p /root/bigs/scripts && touch /var/log/bigs-backup.log && chmod 644 /var/log/bigs-backup.log && touch /var/log/bigs-cleanup.log && chmod 644 /var/log/bigs-cleanup.log"
          echo "Убедились, что каталоги на сервере существуют" >> $GITHUB_STEP_SUMMARY

      - name: Copy files & restart services
        run: |
          echo "Копируем файлы на сервер"
          scp -i ~/.ssh/id_rsa -P ${{ secrets.SSH_PORT }} docker-compose.production.yml \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.PROJECT_DIR }}/docker-compose.production.yml
          scp -i ~/.ssh/id_rsa -P ${{ secrets.SSH_PORT }} Makefile \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.PROJECT_DIR }}/Makefile
          scp -i ~/.ssh/id_rsa -P ${{ secrets.SSH_PORT }} nginx.conf \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.PROJECT_DIR }}/nginx.conf
          scp -i ~/.ssh/id_rsa -P ${{ secrets.SSH_PORT }} env/frontend/nginx.conf \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.PROJECT_DIR }}/env/frontend/nginx.conf
          scp -i ~/.ssh/id_rsa -P ${{ secrets.SSH_PORT }} env/frontend/local.conf \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.PROJECT_DIR }}/env/frontend/local.conf
          scp -r -i ~/.ssh/id_rsa -P ${{ secrets.SSH_PORT }} env/pgsql/ \
              "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.PROJECT_DIR }}/env/"
          scp -i ~/.ssh/id_rsa -P ${{ secrets.SSH_PORT }} scripts/create_backup_cron.sh \
              "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.PROJECT_DIR }}/scripts/create_backup_cron.sh"
          scp -i ~/.ssh/id_rsa -P ${{ secrets.SSH_PORT }} scripts/server_disk_cleanup.sh \
              "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.PROJECT_DIR }}/scripts/server_disk_cleanup.sh"
          scp -i ~/.ssh/id_rsa -P ${{ secrets.SSH_PORT }} scripts/install_cleanup_cron.sh \
              "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.PROJECT_DIR }}/scripts/install_cleanup_cron.sh"

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << EOF
          set -e
          cat > '${{ secrets.PROJECT_DIR }}/.telegram-cleanup.env' << 'ENVEOF'
          TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          ENVEOF
          chmod 600 '${{ secrets.PROJECT_DIR }}/.telegram-cleanup.env'
          bash '${{ secrets.PROJECT_DIR }}/scripts/install_cleanup_cron.sh'
          EOF

          echo "Перезапускаем стек контейнеров"
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
          set -e
          cd ${{ secrets.PROJECT_DIR }}
          COMPOSE="docker compose -p bigs -f docker-compose.production.yml"

          df -h /
          DISK_USE=$(df / | tail -1 | awk '{print $5}' | tr -d '%')
          if [ "$DISK_USE" -gt 85 ]; then
            docker image prune -af
            docker builder prune -af 2>/dev/null || true
            find /var/lib/docker/containers -name '*-json.log' -size +5M -exec truncate -s 2M {} \; 2>/dev/null || true
          else
            docker image prune -f
          fi

          # Зависшие контейнеры от прерванного recreate (hash_bigs-*)
          docker ps -a --format '{{.Names}}' | grep -E '^[0-9a-f]+_bigs-' | xargs -r docker rm -f || true

          $COMPOSE pull
          $COMPOSE up -d --remove-orphans

          echo "Ждём healthy db и backend..."
          for i in $(seq 1 40); do
            db=$(docker inspect -f '{{.State.Health.Status}}' bigs-db 2>/dev/null || echo missing)
            backend=$(docker inspect -f '{{.State.Health.Status}}' bigs-backend 2>/dev/null || echo missing)
            if [ "$db" = "healthy" ] && [ "$backend" = "healthy" ]; then break; fi
            if [ "$i" -eq 40 ]; then
              $COMPOSE ps
              docker logs bigs-db --tail 20 2>&1 || true
              docker logs bigs-backend --tail 20 2>&1 || true
              df -h /
              exit 1
            fi
            sleep 3
          done
          EOF

      - name: Disk usage Telegram alert
        run: |
          DISK_USE=$(ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "df / | tail -1 | awk '{print \$5}' | tr -d '%'")
          echo "Disk usage: ${DISK_USE}%"
          if [ "$DISK_USE" -gt 80 ]; then
            echo "disk_warning=true" >> "$GITHUB_ENV"
            echo "disk_use=${DISK_USE}" >> "$GITHUB_ENV"
          fi

      - name: Send disk warning
        if: env.disk_warning == 'true'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ⚠️ *BIGS disk warning*
            Disk usage: *${{ env.disk_use }}%*
            Deploy succeeded, but disk is above 80%.
            Server: ${{ secrets.SSH_HOST }}

      - name: Итог (deploy)
        run: |
          echo "Деплой успешно выполнен на сервере ${{ secrets.SSH_HOST }}" >> $GITHUB_STEP_SUMMARY

  verify:
    name: Verify deployment
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -t rsa ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: docker ps & health
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
          set -e
          docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'

          db_status=$(docker inspect -f '{{.State.Health.Status}}' bigs-db)
          backend_status=$(docker inspect -f '{{.State.Health.Status}}' bigs-backend)
          if [ "$db_status" != "healthy" ] || [ "$backend_status" != "healthy" ]; then
            echo "Unhealthy: db=$db_status backend=$backend_status"
            docker logs bigs-db --tail 20 2>&1 || true
            docker logs bigs-backend --tail 20 2>&1 || true
            exit 1
          fi

          curl -fsS https://avolkovshop.ru/api/health/ping | grep -q '"status":"ok"'
          curl -fsS -o /dev/null https://avolkovshop.ru/
          df -h /
          EOF
          echo "Проверка контейнеров и API выполнена" >> $GITHUB_STEP_SUMMARY

  notify:
    name: Notify Telegram
    runs-on: ubuntu-latest
    if: always()
    needs: [ deploy ]
    steps:
      - name: Send message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            BIGS Deployment *${{ needs.deploy.result }}*
            Repo: https://github.com/${{ github.repository }}
            Commit: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
